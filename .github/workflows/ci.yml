name: Rust CI/CD

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Verify version tag matches Cargo.toml
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        $version = (Get-Content Cargo.toml | Select-String '^version').ToString() -replace '.*=\s*"(.+)"','$1'
        if ("v$version" -ne "${{ github.ref_name }}") {
          Write-Error "Version mismatch: tag=${{ github.ref_name }}, Cargo.toml=v$version"
          exit 1
        }

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc , i686-pc-windows-msvc

    - uses: Swatinem/rust-cache@v2
      
    - name: Build x86-64
      run: cargo build --release --verbose
      
    - name: Build x86
      run: cargo build --release --target i686-pc-windows-msvc --verbose

    - uses: negrutiu/nsis-install@v2
    
    - name: Build installer
      run: |
        $version = (Get-Content Cargo.toml | Select-String '^version').ToString() -replace '.*=\s*"(.+)"','$1'
        makensis /V4 /WX /DVERSION=$version installer.nsi

    - uses: actions/upload-artifact@v6
      with:
        name: uo_keyboard
        path: uo_keyboard_setup.exe
        compression-level: 0
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v6    
    - uses: actions/download-artifact@v7
      with:
        path: artifacts
    
    - name: Display structure
      run: ls -R artifacts
    
    - name: Re-Tag preview
      if: github.ref == 'refs/heads/master'
      run: gh release delete preview --yes || true
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Create Preview Release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: preview
        name: Ũõ Keyboard Preview
        draft: false
        prerelease: true
        files: artifacts/**/*

    - name: Create Stable Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: Ũõ Keyboard ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: artifacts/**/*
